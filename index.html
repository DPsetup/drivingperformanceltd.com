    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.55); }

    /* Grid texture */
    .grid-tex {
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 80px 80px;
    }

    /* Marquee */
    @keyframes marqueeScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .marquee-run { animation: marqueeScroll 38s linear infinite; }

    /* Hero fade-ups */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
    .fu1 { animation: fadeUp 1s ease 0.05s both; }
    .fu2 { animation: fadeUp 1s ease 0.2s  both; }
    .fu3 { animation: fadeUp 1s ease 0.35s both; }
    .fu4 { animation: fadeUp 1s ease 0.5s  both; }
    .fu5 { animation: fadeUp 1s ease 0.65s both; }

    /* Scroll pulse */
    @keyframes scrollPulse { 0%,100% { opacity: 0.2; } 50% { opacity: 0.9; } }
    .scroll-pulse { animation: scrollPulse 2.8s ease-in-out infinite; }

    /* Nav link underline */
    .nav-lnk { position: relative; transition: color 0.3s; }
    .nav-lnk::after { content:''; position:absolute; bottom:-3px; left:0; width:0; height:1px; background:#fff; transition: width 0.35s ease; }
    .nav-lnk:hover::after, .nav-lnk.active::after { width: 100%; }
    .nav-lnk:hover { color: #fff !important; }

    /* Button hovers */
    .btn-gold  { transition: background 0.3s, color 0.3s; }
    .btn-gold:hover  { background: #e0e0e0 !important; color: #000 !important; }
    .btn-ghost { transition: background 0.3s, color 0.3s, border-color 0.3s; }
    .btn-ghost:hover { background: #fff !important; color: #000 !important; border-color: #fff !important; }
    .btn-gold-ol { transition: background 0.3s, color 0.3s; }
    .btn-gold-ol:hover { background: #fff !important; color: #000 !important; }

    /* Card hover */
    .event-card { transition: border-color 0.4s ease; cursor: pointer; }
    .event-card:hover { border-color: rgba(255,255,255,0.5) !important; }
    .card-img-inner { transition: transform 0.65s ease; }
    .event-card:hover .card-img-inner { transform: scale(1.045); }

    /* Play button */
    .play-btn { transition: background 0.3s, border-color 0.3s, transform 0.3s; }
    .play-btn:hover { background: rgba(255,255,255,0.35) !important; border-color: #fff !important; transform: scale(1.1); }

    /* Preview mini card hover */
    .mini-card { transition: border-color 0.4s; cursor: pointer; }
    .mini-card:hover { border-color: rgba(255,255,255,0.45) !important; }
    .mini-card-img { transition: transform 0.55s ease; }
    .mini-card:hover .mini-card-img { transform: scale(1.04); }

    /* Footer link hover */
    .ftr-lnk { transition: color 0.3s; }
    .ftr-lnk:hover { color: #fff !important; }
    
    /* Input Autofill fix */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active,
    textarea:-webkit-autofill,
    textarea:-webkit-autofill:hover,
    textarea:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0 30px #0A0A0A inset !important;
        -webkit-text-fill-color: white !important;

function useWindowWidth() {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const fn = () => setW(window.innerWidth);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return w;
}

    setBasketAdded(true);

    e.preventDefault();

  const ref = useRef(null);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const onScroll = () => setScrolled(el.scrollTop > 50);
    el.addEventListener('scroll', onScroll);
    return () => el.removeEventListener('scroll', onScroll);
  }, []);

  const isMobile = useWindowWidth() < 768;

  const navTo = (p) => {
    setPage(p);
    if (ref.current) ref.current.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // Basic Routing Logic
  let content;
  if (page === 'home') {
    content = <HomePage setPage={navTo} isMobile={isMobile} />;
  } else if (page === 'events') {
    content = <EventsPage setPage={navTo} isMobile={isMobile} />;
  } else if (page === 'contact') {
    content = <ContactPage setPage={navTo} isMobile={isMobile} />;
  } else if (page === 'event-bespoke') {
    content = <BespokePage setPage={navTo} isMobile={isMobile} />;
  } else if (page.startsWith('event-')) {
    const evId = page.replace('event-', '');
    const ev = EVENTS.find(e => e.id === evId);
    content = ev ? <EventDetail ev={ev} setPage={navTo} isMobile={isMobile} /> : <EventsPage setPage={navTo} isMobile={isMobile} />;
  }

  return (
    <div ref={ref} style={{
      height: '100vh', overflowY: 'auto',
      background: '#000', color: '#fff',
      fontFamily: "'Montserrat','Helvetica Neue',Arial,sans-serif",
      fontWeight: 300,
    }}>
      <Navbar page={page} setPage={navTo} scrolled={scrolled} isMobile={isMobile} />
      {content}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
